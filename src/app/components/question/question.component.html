<section class="question-shell" id="q-card">
  <div class="question-loading-overlay" *ngIf="isLoading">
    <div class="question-loader-panel">
      <div class="question-spinner"></div>
      <p>Loading questions...</p>
    </div>
  </div>
  <div *ngIf="isLoading">
    <p class="loading-state">Loading questions...</p>
  </div>
  <div *ngIf="!isLoading">
    <div class="question-nav">
      <button class="btn btn-outline-secondary" type="button" (click)="goToQuizBrowser()">Back To Quiz Browser</button>
    </div>
    <div class="question-header">
      <div>
        <p class="question-kicker">{{ category }} | {{ difficulty | uppercase }}</p>
        <h3>{{ quizTitle || 'Quiz Session' }}</h3>
      </div>
      <div class="question-progress" *ngIf="questionCount">
        Question {{ currentPage }} / {{ questionCount }}
      </div>
    </div>
    <p *ngIf="errorMessage" class="alert alert-warning">{{ errorMessage }}</p>
    <form #quizForm="ngForm" ngForm (ngSubmit)="submitAnswer(quizForm.value)">
      <div *ngIf="currentQuestion as question">
        <article class="question-card">
          <h4 id="question">{{ question.text }}</h4>
          <div class="answer-list">
            <div *ngFor="let answer of question.answers">
              <label *ngIf="answer?.text" class="answer-option">
                <input type="radio" [disabled]="isAnswerCorrect" ngModel name="option" #radioOption [value]="answer.id" required>
                <span>{{ answer.text }}</span>
              </label>
            </div>
          </div>
        </article>
      </div>
      <div *ngIf="showResult">
        <p *ngIf="isAnswerCorrect" id="correct" class="alert"><i class="fa fa-check" aria-hidden="true"></i> Correct Answer!</p>
        <p *ngIf="!isAnswerCorrect" id="wrong" class="alert"><i class="fa fa-times" aria-hidden="true"></i> Wrong Answer, Try Again!</p>
      </div>
      <p *ngIf="selectOption" id="warning" class="alert"><i class="fa fa-exclamation-circle" aria-hidden="true"></i> Please Select an Option From Above</p>
      <button class="btn btn-success" type="submit" *ngIf="!isAnswerCorrect" id="button">Submit Answer</button>
    </form>
    <button class="btn btn-primary" (click)="nextQuestion(currentPage)" *ngIf="isAnswerCorrect && !showSubmitQuizButton" id="button">Next Question</button>
    <button class="btn btn-primary" (click)="submitQuiz()" *ngIf="isAnswerCorrect && showSubmitQuizButton" id="button">Submit Quiz</button>
  </div>
</section>
